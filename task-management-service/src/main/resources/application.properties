spring.application.name=task-management-service
server.port=8082
spring.profiles.active=sso
spring.mvc.async.request-timeout=1800000

# DataSource Configuration (Using H2 for development/testing ease)
# Use in-memory H2 for testing
spring.datasource.url=jdbc:h2:file:./data/taskdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Flyway for H2 test run (script is Postgres specific)
spring.flyway.enabled=false

# JWT Configuration (Example key, should be in env var in production)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

task.management.api.url=http://localhost:8082/api
task.tree.max-depth=${TASK_TREE_MAX_DEPTH:5}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:8081,http://localhost:5173,http://localhost:5174}
logging.level.com.example.taskmanagement.security=INFO
app.log.dir=./logs
app.log.level.root=INFO
app.log.level.app=DEBUG
app.log.async.queue-size=8192
app.log.max-file-size=50MB
app.log.max-history-days=7
app.log.total-size-cap=5GB
app.log.monitor.enabled=true
app.log.monitor.max-file-size-mb=1024
app.log.monitor.error-patterns=timeout,python_exit_,output_not_found,Unhandled error
app.log.monitor.cooldown-seconds=300
app.log.archive.retention-days=30
