# SSO统一登录对接配置
# 认证模式：jwt | sso | both (兼容模式，优先sso，失败回退jwt)
auth.mode=${AUTH_MODE:both}

# SSO服务地址
sso.base-url=${SSO_BASE_URL:http://localhost:8080}

# 客户端凭证（向SSO注册时获取）
# 请替换为SSO系统分配的真实值
sso.client-id=${SSO_CLIENT_ID:task-management-service}
sso.client-secret=${SSO_CLIENT_SECRET:}
sso.redirect-uri=${SSO_REDIRECT_URI:http://localhost:5173/sso/callback}

# UPM权限服务对接配置（服务间调用）
upm.base-url=${UPM_BASE_URL:http://localhost:8081}
upm.internal.api.key=${UPM_INTERNAL_API_KEY:}
upm.api.token=${UPM_API_TOKEN:}

# External system registration whitelist (SSO clientId)
# Primary source: UPM /api/oauth-clients; bootstrap is optional fallback list (comma-separated)
sso.client-whitelist.bootstrap=${SSO_CLIENT_WHITELIST_BOOTSTRAP:}
sso.client-whitelist.refresh-ms=${SSO_CLIENT_WHITELIST_REFRESH_MS:300000}
